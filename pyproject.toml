[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lilbot"
version = "0.1.0"
description = "Minimal local LLM CLI"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
  { name = "Lilbot Contributors" }
]
keywords = ["llm", "cli", "local"]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "torch",
  "transformers",
  "bitsandbytes",
  "accelerate",
]

[project.scripts]
lilbot = "lilbot.cli.main:main"

[tool.setuptools]
packages = ["lilbot", "lilbot.cli", "lilbot.llm", "lilbot.memory", "lilbot.tools"]
